version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@latest
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter web build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/web/node_modules/**/*
      - apps/web/.next/cache/**/*
