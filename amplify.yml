version: 1
env:
  variables:
    NODE_ENV: production
    DATABASE_URL: $DATABASE_URL
    JWT_SECRET: $JWT_SECRET
    STORAGE_BUCKET: $STORAGE_BUCKET
    STORAGE_ACCESS_KEY: $STORAGE_ACCESS_KEY
    STORAGE_SECRET_KEY: $STORAGE_SECRET_KEY
    STORAGE_REGION: $STORAGE_REGION
    STORAGE_ENDPOINT: $STORAGE_ENDPOINT
    STORAGE_PREFIX: $STORAGE_PREFIX
    NEXT_PUBLIC_API_URL: $NEXT_PUBLIC_API_URL
    REDIS_HOST: $REDIS_HOST
    REDIS_PORT: $REDIS_PORT
    REDIS_TLS: $REDIS_TLS
    LLM_API_URL: $LLM_API_URL
    LLM_API_KEY: $LLM_API_KEY
    LLM_MODEL: $LLM_MODEL
    EMBEDDING_API_URL: $EMBEDDING_API_URL
    EMBEDDING_MODEL: $EMBEDDING_MODEL
    EMBEDDING_API_KEY: $EMBEDDING_API_KEY
    RERANKER_API_URL: $RERANKER_API_URL
    RERANKER_MODEL: $RERANKER_MODEL
    RERANKER_API_KEY: $RERANKER_API_KEY
    SQS_QUEUE_URL: $SQS_QUEUE_URL
    SQS_EXTRACT_RETRY_QUEUE_URL: $SQS_EXTRACT_RETRY_QUEUE_URL
    MARKER_EC2_INSTANCE_ID: $MARKER_EC2_INSTANCE_ID
    MARKER_ASG_NAME: $MARKER_ASG_NAME
    MARKER_ASG_REGION: $MARKER_ASG_REGION
    MARKER_API_URL: $MARKER_API_URL
    DATALAB_API_KEY: $DATALAB_API_KEY
    NEXTAUTH_SECRET: $NEXTAUTH_SECRET
    NEXT_PUBLIC_APP_URL: $NEXT_PUBLIC_APP_URL
    GOOGLE_ID: $GOOGLE_ID
    GOOGLE_SECRET: $GOOGLE_SECRET
    GITHUB_ID: $GITHUB_ID
    GITHUB_SECRET: $GITHUB_SECRET
    ENABLE_CREDENTIALS_AUTH: $ENABLE_CREDENTIALS_AUTH
    SERVER_ENCRYPTION_SECRET: $SERVER_ENCRYPTION_SECRET
    NEXTAUTH_URL: $NEXTAUTH_URL
    COHERE_API_KEY: $COHERE_API_KEY
    NEXT_PUBLIC_CHAT_URL: $NEXT_PUBLIC_CHAT_URL
    SES_REGION: $SES_REGION
    SES_ACCESS_KEY_ID: $SES_ACCESS_KEY_ID
    SES_SECRET_ACCESS_KEY: $SES_SECRET_ACCESS_KEY
    SES_FROM_EMAIL: $SES_FROM_EMAIL
    SECRETS_ID: $SECRETS_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --include=dev --legacy-peer-deps
    build:
      commands:
        # run pending database migrations while DATABASE_URL is still set
        - npm run migrate
        # write runtime env vars to .env.production for SSR runtime,
        # then UNSET them so empty-string values don't break the build.
        # next-auth crashes with new URL("") if NEXTAUTH_URL is "" at import time.
        - |
          RUNTIME_VARS="DATABASE_URL JWT_SECRET STORAGE_BUCKET STORAGE_ACCESS_KEY \
            STORAGE_SECRET_KEY STORAGE_REGION STORAGE_ENDPOINT STORAGE_PREFIX \
            REDIS_HOST REDIS_PORT REDIS_TLS \
            LLM_API_URL LLM_API_KEY LLM_MODEL LLM_TIMEOUT_MS LLM_THINKING \
            EMBEDDING_API_URL EMBEDDING_MODEL EMBEDDING_API_KEY \
            RERANKER_API_URL RERANKER_MODEL RERANKER_API_KEY \
            SQS_QUEUE_URL SQS_EXTRACT_RETRY_QUEUE_URL \
            MARKER_EC2_INSTANCE_ID MARKER_ASG_NAME MARKER_ASG_REGION MARKER_API_URL DATALAB_API_KEY \
            NEXTAUTH_SECRET NEXTAUTH_URL \
            GOOGLE_ID GOOGLE_SECRET GITHUB_ID GITHUB_SECRET \
            ENABLE_CREDENTIALS_AUTH SERVER_ENCRYPTION_SECRET COHERE_API_KEY \
            SES_REGION SES_ACCESS_KEY_ID SES_SECRET_ACCESS_KEY SES_FROM_EMAIL"
          ALL_VARS="$RUNTIME_VARS NEXT_PUBLIC_API_URL NEXT_PUBLIC_APP_URL NEXT_PUBLIC_CHAT_URL SECRETS_ID"
          for var in $ALL_VARS; do
            [ -n "${!var}" ] && echo "${var}=${!var}" >> .env.production || true
          done
          # unset runtime-only vars so next build doesn't see "" as the value
          # (NEXT_PUBLIC_* must stay — they're inlined into the client bundle)
          for var in $RUNTIME_VARS; do
            unset "$var"
          done
        - npm run build
        # verify the Lambda chat URL was inlined into the client bundle
        - |
          if [ -n "$NEXT_PUBLIC_CHAT_URL" ]; then
            if grep -r "$NEXT_PUBLIC_CHAT_URL" .next/static/ >/dev/null 2>&1; then
              echo "OK: NEXT_PUBLIC_CHAT_URL found in client bundle"
            else
              echo "ERROR: NEXT_PUBLIC_CHAT_URL not inlined into client bundle"
              exit 1
            fi
          else
            echo "WARN: NEXT_PUBLIC_CHAT_URL not set — chat streaming disabled"
          fi
        # copy .env.production into the standalone dir so the Next.js server finds
        # it regardless of which CWD Amplify uses when starting the compute process
        - cp .env.production .next/standalone/.env.production
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
      - "../.env.production"
  cache:
    paths:
      - node_modules/**/*
      - .next/**/*
