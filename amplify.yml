version: 1
env:
  variables:
    NODE_ENV: production
    DATABASE_URL: $DATABASE_URL
    JWT_SECRET: $JWT_SECRET
    STORAGE_BUCKET: $STORAGE_BUCKET
    STORAGE_ACCESS_KEY: $STORAGE_ACCESS_KEY
    STORAGE_SECRET_KEY: $STORAGE_SECRET_KEY
    STORAGE_REGION: $STORAGE_REGION
    STORAGE_ENDPOINT: $STORAGE_ENDPOINT
    STORAGE_PREFIX: $STORAGE_PREFIX
    NEXT_PUBLIC_API_URL: $NEXT_PUBLIC_API_URL
    REDIS_HOST: $REDIS_HOST
    REDIS_PORT: $REDIS_PORT
    REDIS_TLS: $REDIS_TLS
    LLM_API_URL: $LLM_API_URL
    LLM_API_KEY: $LLM_API_KEY
    LLM_MODEL: $LLM_MODEL
    EMBEDDING_API_URL: $EMBEDDING_API_URL
    EMBEDDING_MODEL: $EMBEDDING_MODEL
    SQS_QUEUE_URL: $SQS_QUEUE_URL
    SQS_EXTRACT_RETRY_QUEUE_URL: $SQS_EXTRACT_RETRY_QUEUE_URL
    MARKER_EC2_INSTANCE_ID: $MARKER_EC2_INSTANCE_ID
    MARKER_API_URL: $MARKER_API_URL
    DATALAB_API_KEY: $DATALAB_API_KEY
    NEXTAUTH_SECRET: $NEXTAUTH_SECRET
    NEXT_PUBLIC_APP_URL: $NEXT_PUBLIC_APP_URL
    GOOGLE_ID: $GOOGLE_ID
    GOOGLE_SECRET: $GOOGLE_SECRET
    GITHUB_ID: $GITHUB_ID
    GITHUB_SECRET: $GITHUB_SECRET
    ENABLE_CREDENTIALS_AUTH: $ENABLE_CREDENTIALS_AUTH
    SERVER_ENCRYPTION_SECRET: $SERVER_ENCRYPTION_SECRET
    NEXTAUTH_URL: $NEXTAUTH_URL
    COHERE_API_KEY: $COHERE_API_KEY
    SES_REGION: $SES_REGION
    SES_ACCESS_KEY_ID: $SES_ACCESS_KEY_ID
    SES_SECRET_ACCESS_KEY: $SES_SECRET_ACCESS_KEY
    SES_FROM_EMAIL: $SES_FROM_EMAIL
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --include=dev --legacy-peer-deps
    build:
      commands:
        # write runtime env vars without exposing values in build logs
        - |
          for var in DATABASE_URL JWT_SECRET STORAGE_BUCKET STORAGE_ACCESS_KEY \
            STORAGE_SECRET_KEY STORAGE_REGION STORAGE_ENDPOINT STORAGE_PREFIX \
            NEXT_PUBLIC_API_URL REDIS_HOST REDIS_PORT REDIS_TLS \
            LLM_API_URL LLM_API_KEY LLM_MODEL EMBEDDING_API_URL EMBEDDING_MODEL \
            SQS_QUEUE_URL SQS_EXTRACT_RETRY_QUEUE_URL \
            MARKER_EC2_INSTANCE_ID MARKER_API_URL DATALAB_API_KEY \
            NEXTAUTH_SECRET NEXT_PUBLIC_APP_URL \
            GOOGLE_ID GOOGLE_SECRET GITHUB_ID GITHUB_SECRET \
            ENABLE_CREDENTIALS_AUTH SERVER_ENCRYPTION_SECRET COHERE_API_KEY \
            NEXTAUTH_URL \
            SES_REGION SES_ACCESS_KEY_ID SES_SECRET_ACCESS_KEY SES_FROM_EMAIL; do
            [ -n "${!var}" ] && echo "${var}=${!var}" >> .env.production
          done
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
      - '../.env.production'
  cache:
    paths:
      - node_modules/**/*
      - .next/**/*
