version: 1
env:
  variables:
    NODE_ENV: production
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --include=dev
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        # Copy production dependencies into standalone for serverExternalPackages (postgres, etc)
        - cp -r node_modules .next/standalone/ || true
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/**/*
