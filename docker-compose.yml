version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: oghma-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      oghma:
        ipv4_address: 192.168.48.42

  app:
    image: oghma:dev-latest
    container_name: oghma-dev
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - /home/semyon/jenkins/env/oghma-dev.env
    environment:
      QDRANT_URL: http://oghma-qdrant:6333
      QDRANT_COLLECTION: oghma_dev_chunks
    networks:
      oghma:
        ipv4_address: 192.168.48.40

  worker:
    image: oghma-worker:dev-latest
    container_name: oghma-dev-worker
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - /home/semyon/jenkins/env/oghma-dev.env
    environment:
      QDRANT_URL: http://oghma-qdrant:6333
      QDRANT_COLLECTION: oghma_dev_chunks
    networks:
      oghma:
        ipv4_address: 192.168.48.41

networks:
  oghma:
    external: true

volumes:
  qdrant-data:
