version: '3.9'

services:
  # Next.js application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: your-app-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - stack.env
      # - .env.production Uncomment this line to use production environment variables
    networks:
      your-network:
        ipv4_address: your-internal-ip
    # NOTE: Database migrated from PostgreSQL to MariaDB
    # Update stack.env with MariaDB connection string:
    # DATABASE_URL=mysql://your-db-user:password@your-db-host:3306/your-db-name

networks:
  your-network:
    external: true