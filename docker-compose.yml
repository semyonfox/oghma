version: '3.9'

services:
  # Next.js application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ct216_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - env.production
    networks:
      ct216:
        ipv4_address: 172.30.10.8

networks:
  ct216:
    external: true

