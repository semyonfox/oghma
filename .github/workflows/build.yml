name: Build

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Build
        run: npm run build
        continue-on-error: false
        env:
          SERVER_ENCRYPTION_SECRET: ${{ secrets.SERVER_ENCRYPTION_SECRET || 'ci-build-placeholder' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-build-placeholder' }}
          NEXTAUTH_URL: http://localhost:3000
          SQS_QUEUE_URL: https://sqs.eu-west-1.amazonaws.com/000000000000/ci-placeholder
          SQS_EXTRACT_RETRY_QUEUE_URL: https://sqs.eu-west-1.amazonaws.com/000000000000/ci-placeholder-retry
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://localhost:5432/ci
