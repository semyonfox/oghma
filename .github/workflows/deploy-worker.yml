name: Deploy Canvas Import Worker

on:
  push:
    branches: [dev, main]
    paths:
      - ".github/workflows/deploy-worker.yml"
      - "src/lib/canvas/**"
      - "src/lib/chunking.ts"
      - "src/lib/embeddings.ts"
      - "src/lib/embedText.ts"
      - "src/lib/ocr.ts"
      - "src/lib/storage/**"
      - "src/lib/sqs.ts"
      - "src/lib/ecs.ts"
      - "src/database/**"
      - "Dockerfile.worker"
      - "package.json"
      - "package-lock.json"

env:
  AWS_REGION: eu-west-1
  ECR_REPO: <aws-account-id>.dkr.ecr.eu-west-1.amazonaws.com/oghmanotes-worker
  COMMIT_SHA: ${{ github.sha }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'oghmanotes' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'canvas-import-worker' }}
  ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY || 'oghmanotes-worker' }}
  ECS_VPC_NAME: ${{ vars.ECS_VPC_NAME || 'oghmanotes-vpc' }}
  ECS_SECURITY_GROUP_NAME: ${{ vars.ECS_SECURITY_GROUP_NAME || 'oghma-ecs-sg' }}
  ECS_PRIVATE_SUBNET_PREFIX: ${{ vars.ECS_PRIVATE_SUBNET_PREFIX || 'oghma-private-' }}

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<aws-account-id>:role/github-actions-oghma
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.worker -t oghmanotes-worker .
          docker tag oghmanotes-worker:latest "$ECR_REPO:latest"
          docker tag oghmanotes-worker:latest "$ECR_REPO:$COMMIT_SHA"
          docker push "$ECR_REPO:latest"
          docker push "$ECR_REPO:$COMMIT_SHA"

      - name: Register task definition and deploy service
        run: |
          set -euo pipefail

          task_def_arn=$(aws ecs list-task-definitions \
            --family-prefix "$ECS_TASK_FAMILY" \
            --sort DESC \
            --max-items 1 \
            --region "$AWS_REGION" \
            --query 'taskDefinitionArns[0]' \
            --output text)

          if [ -z "$task_def_arn" ] || [ "$task_def_arn" = "None" ]; then
            echo "::error::No ECS task definition found for family '$ECS_TASK_FAMILY' in region '$AWS_REGION'."
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "$task_def_arn" \
            --region "$AWS_REGION" \
            --query 'taskDefinition' > task-definition.json

          jq '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
              .image = (env.ECR_REPO + ":" + env.COMMIT_SHA)
              | .environment = (
                  (.environment // [])
                  | map(
                      if .name == "STORAGE_PREFIX" then .value = "oghma"
                      elif .name == "ECS_CLUSTER" then .value = env.ECS_CLUSTER
                      elif .name == "ECS_SERVICE" then .value = env.ECS_SERVICE
                      else .
                      end
                    )
                  | (if any(.[]; .name == "STORAGE_PREFIX") then . else . + [{"name":"STORAGE_PREFIX","value":"oghma"}] end)
                  | (if any(.[]; .name == "ECS_CLUSTER") then . else . + [{"name":"ECS_CLUSTER","value":env.ECS_CLUSTER}] end)
                  | (if any(.[]; .name == "ECS_SERVICE") then . else . + [{"name":"ECS_SERVICE","value":env.ECS_SERVICE}] end)
                )
            )
          ' task-definition.json > task-definition-register.json

          new_task_def_arn=$(aws ecs register-task-definition \
            --region "$AWS_REGION" \
            --cli-input-json file://task-definition-register.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          cluster_status=$(aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER" \
            --region "$AWS_REGION" \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || true)

          if [ -z "$cluster_status" ] || [ "$cluster_status" = "None" ] || [ "$cluster_status" = "INACTIVE" ]; then
            aws ecs create-cluster \
              --cluster-name "$ECS_CLUSTER" \
              --region "$AWS_REGION" >/dev/null
          fi

          vpc_id=$(aws ec2 describe-vpcs \
            --region "$AWS_REGION" \
            --filters "Name=tag:Name,Values=$ECS_VPC_NAME" \
            --query 'Vpcs[0].VpcId' \
            --output text)

          if [ -z "$vpc_id" ] || [ "$vpc_id" = "None" ]; then
            echo "::error::No VPC found with Name tag '$ECS_VPC_NAME'."
            exit 1
          fi

          security_group_id=$(aws ec2 describe-security-groups \
            --region "$AWS_REGION" \
            --filters "Name=vpc-id,Values=$vpc_id" "Name=group-name,Values=$ECS_SECURITY_GROUP_NAME" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)

          if [ -z "$security_group_id" ] || [ "$security_group_id" = "None" ]; then
            echo "::error::No security group found with name '$ECS_SECURITY_GROUP_NAME' in VPC '$vpc_id'."
            exit 1
          fi

          mapfile -t private_subnets < <(
            aws ec2 describe-subnets \
              --region "$AWS_REGION" \
              --filters "Name=vpc-id,Values=$vpc_id" \
              --query 'Subnets[].[SubnetId,Tags[?Key==`Name`]|[0].Value]' \
              --output text | awk -v prefix="$ECS_PRIVATE_SUBNET_PREFIX" '$2 ~ ("^" prefix) { print $1 }'
          )

          if [ "${#private_subnets[@]}" -lt 2 ]; then
            echo "::error::Expected at least two private subnets with prefix '$ECS_PRIVATE_SUBNET_PREFIX' in VPC '$vpc_id'."
            exit 1
          fi

          service_count=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query 'length(services)' \
            --output text)

          if [ "$service_count" = "0" ]; then
            subnet_csv=$(IFS=,; echo "${private_subnets[*]}")

            aws ecs create-service \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --task-definition "$new_task_def_arn" \
              --desired-count 0 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$subnet_csv],securityGroups=[$security_group_id],assignPublicIp=DISABLED}" \
              --region "$AWS_REGION"
          else
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$ECS_SERVICE" \
              --task-definition "$new_task_def_arn" \
              --force-new-deployment \
              --region "$AWS_REGION"
          fi
