name: Deploy Canvas Import Worker

on:
  push:
    branches: [dev, main]
    paths:
      - ".github/workflows/deploy-worker.yml"
      - "src/lib/canvas/**"
      - "src/lib/chunking.ts"
      - "src/lib/embeddings.ts"
      - "src/lib/embedText.ts"
      - "src/lib/ocr.ts"
      - "src/lib/storage/**"
      - "src/lib/sqs.ts"
      - "src/lib/ecs.ts"
      - "src/database/**"
      - "Dockerfile.worker"
      - "package.json"
      - "package-lock.json"

env:
  AWS_REGION: eu-west-1
  ECR_REPO: 877013879182.dkr.ecr.eu-west-1.amazonaws.com/oghmanotes-worker
  COMMIT_SHA: ${{ github.sha }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'oghmanotes' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'canvas-import-worker' }}
  ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY || 'oghmanotes-worker' }}
  ECS_VPC_NAME: ${{ vars.ECS_VPC_NAME || 'oghmanotes-vpc' }}
  ECS_SECURITY_GROUP_NAME: ${{ vars.ECS_SECURITY_GROUP_NAME || 'oghma-ecs-sg' }}
  ECS_PRIVATE_SUBNET_PREFIX: ${{ vars.ECS_PRIVATE_SUBNET_PREFIX || 'oghma-private-' }}

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::877013879182:role/github-actions-oghma
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.worker -t oghmanotes-worker .
          docker tag oghmanotes-worker:latest "$ECR_REPO:latest"
          docker tag oghmanotes-worker:latest "$ECR_REPO:$COMMIT_SHA"
          docker push "$ECR_REPO:latest"
          docker push "$ECR_REPO:$COMMIT_SHA"

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"
